<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>terminal intro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #101010;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    }

    #intro {
      width: 422px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .ln {
      font-size: 12px;
      font-style: normal;
      line-height: 24px;
      letter-spacing: 0.48px;
      font-feature-settings: 'liga' off;
    }

    .ln-name     { color: #fafafa; font-weight: 400; }
    .ln-location { color: #fafafa; font-weight: 400; }
    .ln-tagline  { color: #5c6370; font-weight: 300; }

    .cursor {
      display: inline-block;
      width: 5px; height: 12px;
      background: #abb2bf;
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 1s step-end infinite;
    }

    @media (prefers-color-scheme: light) {
      html, body   { background: #fafafa; }
      .ln-name     { color: #1a1a1a; }
      .ln-location { color: #1a1a1a; }
      .ln-tagline  { color: #9da1a6; }
      .cursor      { background: #383a3e; }
    }

    @keyframes blink {
      0%,  49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="intro">
    <div class="ln ln-name"     id="l1"></div>
    <div class="ln ln-location" id="l2"></div>
    <div class="ln ln-tagline"  id="l3"></div>
  </div>

<script>
  const LINES = [
    { el: document.getElementById('l1'), text: 'Matt Silverman' },
    { el: document.getElementById('l2'), text: 'Based in San Diego, California' },
    { el: document.getElementById('l3'), text: 'AI-native product designer with focus on\nstrategy, craft, and code.' },
  ];

  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  let actx = null;
  const ac = () => {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    return actx;
  };

  function mkNoise(c, dur) {
    const n = Math.ceil(c.sampleRate * dur);
    const buf = c.createBuffer(1, n, c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource(); src.buffer = buf; return src;
  }

  function keyClick() {
    try {
      const c = ac(), t = c.currentTime;
      const noise = mkNoise(c, 0.005);
      const ng = c.createGain();
      ng.gain.setValueAtTime(0.14, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.006);
      noise.connect(ng); ng.connect(c.destination);
      noise.start(); noise.stop(t + 0.007);
      const osc = c.createOscillator(), og = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300 + Math.random() * 60, t);
      osc.frequency.exponentialRampToValueAtTime(80, t + 0.04);
      osc.connect(og); og.connect(c.destination);
      og.gain.setValueAtTime(0.055, t); og.gain.exponentialRampToValueAtTime(0.0001, t + 0.045);
      osc.start(); osc.stop(t + 0.05);
    } catch (_) {}
  }

  function enterClick() {
    try {
      const c = ac(), t = c.currentTime;
      const noise = mkNoise(c, 0.008);
      const ng = c.createGain();
      ng.gain.setValueAtTime(0.22, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.01);
      noise.connect(ng); ng.connect(c.destination);
      noise.start(); noise.stop(t + 0.012);
      const osc = c.createOscillator(), og = c.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.055);
      osc.connect(og); og.connect(c.destination);
      og.gain.setValueAtTime(0.08, t); og.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
      osc.start(); osc.stop(t + 0.065);
    } catch (_) {}
  }

  function blip() {
    try {
      const c = ac(), t = c.currentTime;
      const noise = mkNoise(c, 0.004);
      const ng = c.createGain();
      ng.gain.setValueAtTime(0.05, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.005);
      noise.connect(ng); ng.connect(c.destination);
      noise.start(); noise.stop(t + 0.006);
    } catch (_) {}
  }

  function successChime() {
    try {
      const c = ac();
      [[880, 0, 0.12, 0.15], [1108, 0.18, 0.10, 0.18]].forEach(([hz, delay, vol, decay]) => {
        const osc = c.createOscillator(), g = c.createGain();
        osc.type = 'sine'; osc.frequency.value = hz;
        osc.connect(g); g.connect(c.destination);
        const t = c.currentTime + delay;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + decay);
        osc.start(t); osc.stop(t + decay + 0.01);
      });
    } catch (_) {}
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function typeLine(el, text) {
    let textNode = document.createTextNode('');
    el.appendChild(textNode);
    el.appendChild(cursor);
    for (const ch of text) {
      if (ch === '\n') {
        el.insertBefore(document.createElement('br'), cursor);
        textNode = document.createTextNode('');
        el.insertBefore(textNode, cursor);
      } else {
        textNode.textContent += ch;
        keyClick();
      }
      await sleep(36 + Math.random() * 30);
    }
  }

  async function run() {
    await sleep(420);
    for (let i = 0; i < LINES.length; i++) {
      await typeLine(LINES[i].el, LINES[i].text);
      if (i < LINES.length - 1) {
        enterClick();
        await sleep(220);
      }
    }
    successChime();
  }

  ['click', 'keydown', 'touchstart'].forEach(e =>
    document.addEventListener(e, () => ac(), { once: true, passive: true })
  );

  run();
</script>
</body>
</html>
